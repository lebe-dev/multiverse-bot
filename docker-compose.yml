volumes:
  bot-data:

services:
  bot:
    image: tinyops/multiverse-bot:0.4.0
    #build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      COBALT_API_URL: "http://cobalt:9000"
      SQLITE_PATH: /data/bot.db
    volumes:
      - bot-data:/data
    depends_on:
      - cobalt
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

  cobalt:
    image: ghcr.io/imputnet/cobalt:11
    init: true
    read_only: true
    restart: unless-stopped
    container_name: cobalt
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      # Internal Docker network URL used by cobalt when building tunnel URLs.
      # Both bot and cobalt share the same network, so this resolves correctly.
      API_URL: "http://cobalt:9000/"
    labels:
      - com.centurylinklabs.watchtower.scope=cobalt
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  watchtower:
    image: ghcr.io/containrrr/watchtower
    restart: unless-stopped
    command: --cleanup --scope cobalt --interval 900 --include-restarting
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
