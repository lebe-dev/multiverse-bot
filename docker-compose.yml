volumes:
  bot-data:
  telegram-bot-api-data:

services:
  # ── Telegram Local Bot API ──────────────────────────────────────────────────
  # Allows sending files up to 2 GB. Bot connects via LOCAL_BOT_API_URL.
  # Requires TELEGRAM_API_ID and TELEGRAM_API_HASH in .env.
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_VERBOSITY: "5"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "127.0.0.1:8081:8081"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

  # ── Bot ─────────────────────────────────────────────────────────────────────
  bot:
    build: .
    #image: tinyops/multiverse-bot:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      COBALT_API_URL: "http://cobalt:9000"
      LOCAL_BOT_API_URL: "http://telegram-bot-api:8081"
      SQLITE_PATH: /data/bot.db
    volumes:
      - bot-data:/data
      - ./cookies.txt:/app/cookies.txt:ro
      # Uncomment to persist Google Drive tokens and per-user settings across restarts:
      # - ./user_drive_tokens.json:/app/user_drive_tokens.json
      # - ./user_settings.json:/app/user_settings.json
    depends_on:
      - telegram-bot-api
      - cobalt
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M

  # ── Cobalt (Instagram / Twitter downloader) ──────────────────────────────────
  cobalt:
    image: ghcr.io/imputnet/cobalt:11
    init: true
    read_only: true
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      API_URL: "http://cobalt:9000/"
    labels:
      - com.centurylinklabs.watchtower.scope=cobalt
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── Watchtower (auto-update cobalt) ─────────────────────────────────────────
  watchtower:
    image: ghcr.io/containrrr/watchtower
    restart: unless-stopped
    command: --cleanup --scope cobalt --interval 900 --include-restarting
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
